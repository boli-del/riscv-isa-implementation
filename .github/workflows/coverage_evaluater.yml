name: run_coverage_against_diff
on: push
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
            - name: Setup Python
              uses: actions/setup-python@v5
              with: 
                python-version: "3.13"   
            - name: Verify pip Installation
              run: pip --version
            - name: Install Dependencies
              run: pip install -r requirements.txt
            - name: Install Verilator
              run: sudo apt-get update && sudo apt-get install -y verilator
            - name: Check Verilator Installation
              run: verilator --version
            - name: Run Verilator Coverage Report
              run: SIM=verilator pytest -v testbenches/test_runner.py
            - name: Annotate coverage
              run: verilator_coverage --write-info coverage.info sim_build/coverage.dat
            - name: Gate diff coverage
              run: diff=cover coverage.info --compare-branch = origin/main --fail-under=85
